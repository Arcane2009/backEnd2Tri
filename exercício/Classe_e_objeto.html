<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>criador/herois.com</title>
   <link rel="stylesheet" href="./Classe_e_objeto.css">
</head>
<body>

    <h2>⚔️Criador de Heróis⚔️</h2>
    <h3>Bem-vindo à <strong>Dungeon</strong></h3>
    <video class="cult_video" autoplay muted loop>
        <source src="feb83e698c80217ce360f52c2aad83fc.webm" type="video/webm" />
    </video>
    <div class="caixa">
        <label>Nome do Herói:</label>
        <input type="text" id="nomeInput" placeholder="Ex: Aragorn">

        <label>Classe:</label>
        <select id="classeSelect">
            <option value="Artífice">Artífice</option>
            <option value="Bárbaro">Bárbaro</option>
            <option value="Bardo">Bardo</option>
            <option value="Bruxo">Bruxo</option>
            <option value="Clérigo">Clérigo</option>
            <option value="Druida">Druida</option>
            <option value="Feiticeiro">Feiticeiro</option>
            <option value="Patrulheiro">Patrulheiro</option>
            <option value="Guerreiro">Guerreiro</option>
            <option value="Ladino">Ladino</option>
            <option value="Mago">Mago</option>
            <option value="Monge">Monge</option>
            <option value="Paladino">Paladino</option>
        </select>

        <label>Nível do Herói:</label>
        <input type="number" id="nivelInput" min="0" max="20" placeholder="Ex: 5">

        <button onclick="criarHeroi()">Criar Herói</button>
    </div>

    <div class="caixa" id="resultado" style="display:none;">
        <h3>Herói criado com sucesso!</h3>
        <p id="dadosHeroi"></p>
    </div>

    <script src="./Classe_e_objeto.js">
        
    </script>
</body>
</html>
